<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Pipeline Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <div class="w-64 bg-white shadow-md flex flex-col h-full z-10">
        <div class="p-4 border-b bg-gray-900 text-white">
            <h1 class="text-xl font-bold">Pipelines</h1>
        </div>
        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4">
            <p class="text-gray-500 text-sm">Loading pipelines...</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <div class="p-4 border-b bg-white shadow-sm flex justify-between items-center z-10">
            <h2 id="viewer-title" class="text-lg font-semibold text-gray-700">Select a file to view</h2>
            <a id="download-btn" href="#" class="hidden px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm font-medium transition-colors" download>Download Raw</a>
        </div>
        <div class="flex-1 p-6 overflow-auto bg-gray-50" id="viewer-container">
            <div class="text-gray-400 flex items-center justify-center h-full">
                No file selected
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
