name: Deploy Dashboard to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'pipelines/**'
      - 'index.html'
      - 'js/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Generate Manifest
        run: python pipelines/generate_manifest.py
        
      - name: Prepare site directory
        run: |
          mkdir _site
          cp index.html _site/
          cp -r js _site/
          cp -r pipelines _site/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
